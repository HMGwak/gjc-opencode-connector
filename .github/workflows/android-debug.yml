name: Android Debug APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_android:
        description: Build and upload the Android debug APK
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: android-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.build_android) || (github.event_name == 'push' && vars.ANDROID_BUILD_ENABLED == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify source
        run: |
          bun run typecheck
          bun test

      - name: Build debug APK
        run: bun run build:android

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: planee-agent-hub-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
